<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Urodzinowe Merge 256</title>
    <style>
        :root {
            --bg-color: #faf8ef;
            --grid-bg: #bbada0;
            --tile-bg: #cdc1b4;
            --text-dark: #776e65;
            --text-light: #f9f6f2;
            --accent: #edc22e; /* Kolor kafelka 256 */
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-dark);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden; /* Blokuje scrollowanie strony na telefonie */
            touch-action: none; /* Ważne dla swipe */
        }

        #header {
            text-align: center;
            margin-bottom: 10px;
        }

        h1 { margin: 0; font-size: 32px; }
        #score-container { font-size: 20px; font-weight: bold; }

        #game-container {
            width: 320px;
            height: 320px;
            background-color: var(--grid-bg);
            border-radius: 6px;
            position: relative;
            padding: 10px;
            box-sizing: border-box;
        }

        .grid-row {
            display: flex;
            margin-bottom: 10px;
        }

        .grid-row:last-child { margin-bottom: 0; }

        .grid-cell {
            width: 67.5px;
            height: 67.5px;
            margin-right: 10px;
            background-color: rgba(238, 228, 218, 0.35);
            border-radius: 3px;
        }

        .grid-cell:last-child { margin-right: 0; }

        .tile {
            width: 67.5px;
            height: 67.5px;
            border-radius: 3px;
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 32px;
            transition: transform 150ms ease-in-out, opacity 150ms ease-in-out;
            z-index: 10;
        }

        /* Kolory Kafelków */
        .tile-2    { background: #eee4da; color: var(--text-dark); }
        .tile-4    { background: #ede0c8; color: var(--text-dark); }
        .tile-8    { background: #f2b179; color: var(--text-light); }
        .tile-16   { background: #f59563; color: var(--text-light); }
        .tile-32   { background: #f67c5f; color: var(--text-light); }
        .tile-64   { background: #f65e3b; color: var(--text-light); }
        .tile-128  { background: #edcf72; color: var(--text-light); font-size: 28px;}
        .tile-256  { background: var(--accent); color: var(--text-light); font-size: 28px; box-shadow: 0 0 15px var(--accent);}

        /* Ekran Zwycięstwa */
        #victory-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(242, 177, 121, 0.9); /* Kolor tła życzeń */
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
            color: var(--text-light);
            padding: 20px;
            box-sizing: border-box;
            animation: fadeIn 0.5s;
        }

        #victory-overlay h2 { font-size: 48px; margin-bottom: 10px; }
        #victory-overlay p { font-size: 24px; margin: 10px 0; line-height: 1.4; }
        #victory-overlay .heart { font-size: 60px; color: #e74c3c; margin-top: 20px;}

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    </style>
</head>
<body>

    <div id="header">
        <h1>Merge do 256!</h1>
        <div id="score-container">Wynik: <span id="score">0</span></div>
    </div>

    <div id="game-container">
        <!-- Siatka tła -->
        <div class="grid-row"><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div></div>
        <div class="grid-row"><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div></div>
        <div class="grid-row"><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div></div>
        <div class="grid-row"><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div></div>
        
        <!-- Tu będą wskakiwać kafelki gry -->
        <div id="tile-container"></div>
    </div>

    <!-- EKRAN ZWYCIĘSTWA -->
    <div id="victory-overlay">
        <!-- ========================================= -->
        <!-- TU MOŻESZ ZMIENIĆ TEKST ŻYCZEŃ -->
        <h2>WSZYSTKIEGO NAJLEPSZEGO!</h2>
        <p>Udało Ci się zebrać 256!</p>
        <p>Z okazji Twoich 23 urodzin życzę Ci wszystkiego co najwspanialsze, spełnienia marzeń i samych sukcesów.</p>
        <div class="heart">Kocham Cię ❤️</div>
        <!-- ========================================= -->
    </div>

    <script>
        // Logika gry w czystym JavaScript
        const size = 4;
        const targetValue = 256; // CEL GRY
        let board = [];
        let score = 0;
        let isGameWon = false;

        const gameContainer = document.getElementById('game-container');
        const tileContainer = document.getElementById('tile-container');
        const scoreDisplay = document.getElementById('score');
        const victoryOverlay = document.getElementById('victory-overlay');

        // Rozmiary i marginesy kafelków (zgodne z CSS)
        const tileSize = 67.5;
        const tileMargin = 10;

        function initGame() {
            board = Array(size).fill(0).map(() => Array(size).fill(0));
            score = 0;
            isGameWon = false;
            tileContainer.innerHTML = '';
            victoryOverlay.style.display = 'none';
            scoreDisplay.innerText = score;
            addRandomTile();
            addRandomTile();
            drawBoard();
        }

        // Dodaje 2 lub 4 w pustym miejscu
        function addRandomTile() {
            let emptyCells = [];
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (board[r][c] === 0) emptyCells.push({r, c});
                }
            }
            if (emptyCells.length > 0) {
                let {r, c} = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                board[r][c] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        // Rysuje kafelki na podstawie macierzy board
        function drawBoard() {
            tileContainer.innerHTML = '';
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    let value = board[r][c];
                    if (value !== 0) {
                        let tileDiv = document.createElement('div');
                        tileDiv.className = `tile tile-${value}`;
                        tileDiv.innerText = value;
                        
                        // Obliczanie pozycji Absolutnej
                        let top = tileMargin + r * (tileSize + tileMargin);
                        let left = tileMargin + c * (tileSize + tileMargin);
                        tileDiv.style.transform = `translate(${left}px, ${top}px)`;
                        
                        tileContainer.appendChild(tileDiv);

                        // Sprawdź czy wygrana
                        if (value === targetValue && !isGameWon) {
                            endGame();
                        }
                    }
                }
            }
            scoreDisplay.innerText = score;
        }

        function endGame() {
            isGameWon = true;
            setTimeout(() => {
                victoryOverlay.style.display = 'flex';
            }, 500); // Małe opóźnienie, żeby zobaczyć kafelek 256
        }

        // --- LOGIKA RUCHU ---
        function slide(row) {
            // [0, 2, 2, 2] -> [2, 2, 2]
            let arr = row.filter(val => val);
            // [2, 2, 2] -> [4, 0, 2]
            for (let i = 0; i < arr.length - 1; i++) {
                if (arr[i] === arr[i + 1]) {
                    arr[i] *= 2;
                    score += arr[i];
                    arr[i + 1] = 0;
                }
            }
            // [4, 0, 2] -> [4, 2]
            arr = arr.filter(val => val);
            // [4, 2] -> [4, 2, 0, 0]
            while (arr.length < size) {
                arr.push(0);
            }
            return arr;
        }

        function handleMove(direction) {
            if (isGameWon) return;
            
            let oldBoard = JSON.stringify(board);

            if (direction === 'LEFT' || direction === 'RIGHT') {
                for (let r = 0; r < size; r++) {
                    let row = board[r];
                    if (direction === 'RIGHT') row.reverse();
                    let newRow = slide(row);
                    if (direction === 'RIGHT') newRow.reverse();
                    board[r] = newRow;
                }
            } else if (direction === 'UP' || direction === 'DOWN') {
                for (let c = 0; c < size; c++) {
                    let col = [];
                    for (let r = 0; r < size; r++) col.push(board[r][c]);
                    
                    if (direction === 'DOWN') col.reverse();
                    let newCol = slide(col);
                    if (direction === 'DOWN') newCol.reverse();
                    
                    for (let r = 0; r < size; r++) board[r][c] = newCol[r];
                }
            }

            // Jeśli plansza się zmieniła, dodaj nowy kafelek
            if (oldBoard !== JSON.stringify(board)) {
                addRandomTile();
                drawBoard();
                // Tu można by dodać sprawdzenie Game Over, 
                // ale dla urodzinowego ułatwienia pomijamy :)
            }
        }

        // --- OBSŁUGA STEROWANIA ---

        // Klawiatura (PC)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft')  handleMove('LEFT');
            if (e.key === 'ArrowRight') handleMove('RIGHT');
            if (e.key === 'ArrowUp')    handleMove('UP');
            if (e.key === 'ArrowDown')  handleMove('DOWN');
        });

        // Swipe (Telefon)
        let touchStartX = 0;
        let touchStartY = 0;

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, false);

        document.addEventListener('touchend', (e) => {
            let touchEndX = e.changedTouches[0].screenX;
            let touchEndY = e.changedTouches[0].screenY;
            
            let dx = touchEndX - touchStartX;
            let dy = touchEndY - touchStartY;
            
            // Próg minimalnego przesunięcia
            if (Math.abs(dx) < 30 && Math.abs(dy) < 30) return;

            // Określenie osi ruchu (pozioma vs pionowa)
            if (Math.abs(dx) > Math.abs(dy)) {
                // Ruch poziomy
                handleMove(dx > 0 ? 'RIGHT' : 'LEFT');
            } else {
                // Ruch pionowy
                handleMove(dy > 0 ? 'DOWN' : 'UP');
            }
        }, false);

        // Start gry
        initGame();

    </script>
</body>
</html>
